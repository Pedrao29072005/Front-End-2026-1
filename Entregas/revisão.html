<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Caixa Livre</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
	.topo{
		background: #ffc107;
		text-align: center;
		font-size: 43px;
		font-weight: bold;
		border: 4px solid #000ead;
	}
	.painel{
		background: #fff;
		padding: 10px;
		margin-bottom: 10px;
		border: 4px solid #a5a5a5;
	}
	.total{
		font-size: 34px;
		text-align: right;
		font-weight: bold;
		color: #000ead;
	}
    </style>
</head>
<body class="bg-primary bg-gradient">
	<div class="container mt-3">
		<div class="topo">
			Caixa Livre
		</div>
		<div class="row mt-3">
			<div class="col-md-5">
				<h3 class="text-white"><span class="badge text-bg-primary">Sua Compra</span></h3>
				<ul id="lista" class="list-group lista"> </ul>
			</div>
			<div class="col-md-7">
				<div class="painel total">
				<span id="total" style="color: #000ead;">0,00</span>
					
				</div>
				<div class="painel">
				<label>Código de Barras</label>
				<input type="number" id="cod" class="form-control" value="1">
				</div>
				
				<div class="painel">
				<label>Quantidade</label>
				<input type="number" id="qtd" class="form-control" value="1">

				<button class="btn btn-success w-100" onclick="addProduto()">Adiciona produto</button>
				</div>
			</div>
		</div>
	</div>

	<script src="js/script2.js"></script>
</body>
</html>
