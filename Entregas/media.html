<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Média</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #8b0000 0%, #c41e3a 50%, #dc143c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 550px;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 36px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            letter-spacing: 1px;
        }

        form {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
            border-top: 5px solid #dc143c;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: #8b0000;
            font-weight: 600;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
            background-color: #fafafa;
        }

        input:focus {
            outline: none;
            border-color: #dc143c;
            background-color: #ffe8ec;
            box-shadow: 0 0 12px rgba(220, 20, 60, 0.3);
            transform: translateY(-2px);
        }

        input::placeholder {
            color: #a0a0a0;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #8b0000 0%, #dc143c 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(139, 0, 0, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button:hover {
            background: linear-gradient(135deg, #660000 0%, #b81830 100%);
            box-shadow: 0 8px 25px rgba(139, 0, 0, 0.4);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
            box-shadow: 0 3px 10px rgba(139, 0, 0, 0.3);
        }

        #resultado {
            margin-top: 30px;
            animation: fadeIn 0.5s ease;
        }

        #resultado > div {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            border-left: 5px solid #dc143c;
            animation: slideUp 0.4s ease;
        }

        #resultado p {
            margin: 12px 0;
            color: #333;
            font-size: 15px;
            line-height: 1.6;
        }

        #resultado p:first-child {
            font-size: 16px;
            font-weight: 600;
            color: #8b0000;
        }

        #resultado p:last-child {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px solid #f0f0f0;
            font-size: 18px;
            font-weight: 700;
            text-align: center;
        }

        .resultado-aprovado {
            border-left-color: #0066cc !important;
            background: linear-gradient(135deg, #f5f9ff 0%, #e8f2ff 100%) !important;
        }

        .resultado-aprovado p:last-child {
            color: #0066cc;
        }

        .resultado-exame {
            border-left-color: #22bb00 !important;
            background: linear-gradient(135deg, #f5fff5 0%, #e8ffe8 100%) !important;
        }

        .resultado-exame p:last-child {
            color: #22bb00;
        }

        .resultado-reprovado {
            border-left-color: #dc143c !important;
            background: linear-gradient(135deg, #fff5f5 0%, #ffe8e8 100%) !important;
        }

        .resultado-reprovado p:last-child {
            color: #dc143c;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 600px) {
            form {
                padding: 25px;
            }

            h1 {
                font-size: 28px;
            }

            button {
                padding: 12px;
                font-size: 14px;
            }

            #resultado p {
                font-size: 14px;
            }

            #resultado p:last-child {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Calculadora de Desempenho</h1>
        
        <form id="formulario">
            <label for="nome">Nome do Aluno:</label>
            <input 
                type="text" 
                id="nome" 
                name="nome" 
                placeholder="Digite o nome"
            >

            <label for="nota1">Nota 1:</label>
            <input 
                type="number" 
                id="nota1" 
                name="nota1" 
                placeholder="0 a 10"
                min="0"
                max="10"
            >

            <label for="nota2">Nota 2:</label>
            <input 
                type="number" 
                id="nota2" 
                name="nota2" 
                placeholder="0 a 10"
                min="0"
                max="10"
            >

            <label for="nota3">Nota 3:</label>
            <input 
                type="number" 
                id="nota3" 
                name="nota3" 
                placeholder="0 a 10"
                min="0"
                max="10"
            >

            <button type="button" onclick="calcularMedia()">Calcular Média</button>
        </form>

        <div id="resultado"></div>
    </div>

    <script>
        function calcularMedia() {
            let nome = document.getElementById('nome').value;
            let nota1 = Number(document.getElementById('nota1').value);
            let nota2 = Number(document.getElementById('nota2').value);
            let nota3 = Number(document.getElementById('nota3').value);
            let resultado = document.getElementById('resultado');

            // Validação
            if (nome.trim() === '') {
                resultado.innerHTML = '<div class="resultado-reprovado"><p style="color: #dc143c;">❌ Por favor, insira o nome do aluno!</p></div>';
                return false;
            }

            if (isNaN(nota1) || isNaN(nota2) || isNaN(nota3)) {
                resultado.innerHTML = '<div class="resultado-reprovado"><p style="color: #dc143c;">❌ Por favor, insira números válidos para todas as notas!</p></div>';
                return false;
            }

            // Calcula a média
            let media = (nota1 + nota2 + nota3) / 3;
            let mediaFormatada = media.toFixed(2);

            let situacao = '';
            let classCss = '';
            let mensagem = '';

            // Define situação e cor
            if (media >= 7.0) {
                situacao = 'APROVADO';
                classCss = 'resultado-aprovado';
                mensagem = `✅ ${nome} está ${situacao}!`;
            } else if (media >= 4.0 && media < 7.0) {
                situacao = 'EXAME';
                classCss = 'resultado-exame';
                let faltaParaDez = (10 - media).toFixed(2);
                mensagem = `⚠️ ${nome} está em ${situacao}! Faltam ${faltaParaDez} pontos para atingir 10!`;
            } else {
                situacao = 'REPROVADO';
                classCss = 'resultado-reprovado';
                mensagem = `❌ ${nome} está ${situacao}!`;
            }

            // Exibe resultado com formatação
            resultado.innerHTML = `
                <div class="${classCss}">
                    <p><strong>👤 Aluno:</strong> ${nome}</p>
                    <p><strong>📝 Notas:</strong> ${nota1} | ${nota2} | ${nota3}</p>
                    <p><strong>📊 Média:</strong> ${mediaFormatada}</p>
                    <p>${mensagem}</p>
                </div>
            `;
        }

        // Permitir validar com Enter
        document.getElementById('formulario').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                calcularMedia();
            }
        });
    </script> 
    
</body>
</html>
