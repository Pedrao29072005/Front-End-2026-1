<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronômetro Pomodoro</title>
    <link rel="stylesheet" href="./Estilos/style2.css">
</head>
<body>
    <div class="pomodoro_timer">
        <h1>Cronômetro Pomodoro de foco</h1>
        <p id="timer">25:00</p>
        <div class="controles">
            <button id="start-btn" onclick="startInterval()">Iniciar</button>
            <button id="pause-btn" onclick="pauseInterval()">Pausar</button>
            <button id="reset-btn" onclick="resetInterval()">Resetar</button>
        </div>
    </div>
    <script src="./js/script4.js"></script>
</body>
</html>
